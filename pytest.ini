[pytest]
norecursedirs = test_helpers
addopts = --import-mode=importlib
markers =
    autotuning: tests that exercise the autotuning path
    no_autotuning: tests that skip the autotuning path
    trtllm: tests that use the trtllm backend
    cudnn: tests that use the cudnn backend
    cutlass: tests that use the cutlass backend
    cute_dsl: tests that use the cute-dsl backend
    b12x: tests that use the b12x (Blackwell SM12x) backend
    auto: tests that use the auto backend
